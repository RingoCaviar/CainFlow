name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # Trigger build when a tag starting with 'v' is pushed (e.g., v1.0)
  workflow_dispatch: # Allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pyinstaller
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }

      - name: Show build environment
        shell: pwsh
        run: |
          python --version
          python -m PyInstaller --version

      - name: Build Release Zip
        shell: pwsh
        run: |
          $REF = "${{ github.ref }}"
          if ($REF -like 'refs/tags/*') {
            $TAG_NAME = "${{ github.ref_name }}"
          } else {
            $SHORT_SHA = "${{ github.sha }}".Substring(0, 7)
            $TAG_NAME = "${{ github.ref_name }}-$SHORT_SHA"
          }
          ./scripts/build-release-local.ps1 -TagName $TAG_NAME -Python python -SkipDependencyInstall

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Cainflow_*.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: CainFlow-${{ github.run_number }}
          path: Cainflow_*.zip
