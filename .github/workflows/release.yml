name: Build and Release EXE

on:
  push:
    tags:
      - 'v*' # Trigger build when a tag starting with 'v' is pushed (e.g., v1.0)
  workflow_dispatch: # Allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }

      - name: Ensure directories exist
        run: |
          if (!(Test-Path "css")) { New-Item -ItemType Directory -Path "css" }
          if (!(Test-Path "js")) { New-Item -ItemType Directory -Path "js" }
          if (!(Test-Path "sounds")) { New-Item -ItemType Directory -Path "sounds" }

      - name: Build Launcher EXE
        run: |
          # Build with bundled static assets
          pyinstaller --onefile --name "CainFlow_Launcher" --icon "cainflow.ico" `
            --add-data "index.html;." `
            --add-data "index.js;." `
            --add-data "index.css;." `
            --add-data "cainflow.ico;." `
            --add-data "allowed_hosts.json;." `
            --add-data "css;css" `
            --add-data "js;js" `
            --add-data "sounds;sounds" `
            --add-data "backend;backend" `
            server.py

      - name: Prepare Distribution Folder
        shell: pwsh
        run: |
          # Create a staging directory
          New-Item -ItemType Directory -Path "release_staging"
          
          # Move the compiled EXE to the staging folder
          Copy-Item "dist/CainFlow_Launcher.exe" "release_staging/CainFlow.exe"
          
          # Only copy the workflows folder to the distribution
          if (Test-Path "workflows") {
            Copy-Item "workflows" -Destination "release_staging" -Recurse
          } else {
            New-Item -ItemType Directory -Path "release_staging/workflows"
          }

      - name: Create Zip Archive
        shell: pwsh
        run: |
          # Use tag name if triggered by a tag, otherwise use branch+short SHA
          $REF = "${{ github.ref }}"
          if ($REF -like 'refs/tags/*') {
            $TAG_NAME = "${{ github.ref_name }}"
          } else {
            $SHORT_SHA = "${{ github.sha }}".Substring(0, 7)
            $TAG_NAME = "${{ github.ref_name }}-$SHORT_SHA"
          }
          # Create a zip named Cainflow_vX.Y.Z.zip
          Compress-Archive -Path "release_staging/*" -DestinationPath "Cainflow_$TAG_NAME.zip"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Cainflow_*.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
